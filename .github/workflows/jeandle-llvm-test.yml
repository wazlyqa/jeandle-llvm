name: "jeandle-llvm check"

on:
  pull_request_target:
    types: [ opened, synchronize, reopened, labeled, unlabeled ]
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "jeandle-llvm test"
    runs-on: ubuntu-22.04

    steps:
      - name: 'checkout the source code'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: build and test
        env:
          HAS_AARCH64: ${{ contains(github.event.pull_request.labels.*.name, 'AArch64') }}
          HAS_RISCV: ${{ contains(github.event.pull_request.labels.*.name, 'RISC-V') }}
        run : |
          targets="X86"
          if [ "$HAS_AARCH64" = "true" ]; then
            targets+=";AArch64"
          fi
          if [ "$HAS_RISCV" = "true" ]; then
            targets+=";RISCV"
          fi
          mkdir build
          cd build
          cmake -G "Unix Makefiles" -DLLVM_TARGETS_TO_BUILD=$targets -DCMAKE_BUILD_TYPE=Release -DLLVM_ENABLE_ASSERTIONS=ON -DLLVM_BUILD_LLVM_DYLIB=ON -DLLVM_DYLIB_COMPONENTS=all ../llvm
          make check-llvm -j $[$(nproc)/2]

  clang-format:
    name: "clang-format check"
    runs-on: ubuntu-22.04
    steps:
      - name: 'checkout the source code'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
      - name: clang-format
        run : |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main"
          sudo apt install -y clang-format-16
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-16 180

          git remote add jeandle-main https://github.com/jeandle/jeandle-llvm.git
          git fetch --depth=1 jeandle-main
          git clang-format-16 jeandle-main/main
          if [ -n "$(git status --porcelain)" ]; then
            echo "Format check failed!"
            exit 1
          else
            exit 0
          fi

  dispatch-to-jdk-test:
    name: "dispatch jeandle-jdk"
    runs-on: ubuntu-22.04
    steps:
      - name: jeandle-jdk-tier1-test
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: jeandle/jeandle-jdk
          event-type: "dispatch-from-llvm"
          client-payload: |
            {
              "id": "Dispatch-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}-${{ github.run_id }}-${{ github.run_attempt }}",
              "target_llvm_repo": "${{ github.event.pull_request.head.repo.full_name }}",
              "target_llvm_ref": "${{ github.event.pull_request.head.ref }}",
              "labels": ${{ toJSON(github.event.pull_request.labels.*.name) }}
            }

      - name: sync-jdk-result
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          TARGET_REPO: "jeandle/jeandle-jdk"
          # Generate the exact ID to search for in step names
          SEARCH_ID: "Dispatch-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}-${{ github.run_id }}-${{ github.run_attempt }}"
        run: |
          # --- Phase 1: Find the triggered workflow run by matching step name ---
          echo "Searching for workflow run with step containing: '$SEARCH_ID'"
          FOUND_RUN_ID=""
          MAX_FIND_ATTEMPTS=$((12 * 60))

          for attempt in $(seq 1 $MAX_FIND_ATTEMPTS); do
            echo "Find attempt $attempt/$MAX_FIND_ATTEMPTS"

            # Fetch recent 100 repository_dispatch runs
            RUNS_RESPONSE=$(curl -s -f -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$TARGET_REPO/actions/runs?event=repository_dispatch&per_page=50")

            # Extract run IDs
            RUN_IDS=$(echo "$RUNS_RESPONSE" | jq -r '.workflow_runs[].id')

            for run_id in $RUN_IDS; do
              # Fetch jobs for this run
              JOBS_RESPONSE=$(curl -s -f -L \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$TARGET_REPO/actions/runs/$run_id/jobs")

              # Check if any step name contains our SEARCH_ID
              MATCH=$(echo "$JOBS_RESPONSE" | jq -r --arg ID "$SEARCH_ID" '
                .jobs[]?.steps[]?.name | select(. != null) | select(contains($ID))' | head -1)

              if [ -n "$MATCH" ]; then
                FOUND_RUN_ID=$run_id
                echo "Found matching run: $FOUND_RUN_ID (matched step: '$MATCH')"
                break 2
              fi
            done

            if [ -z "$FOUND_RUN_ID" ] && [ $attempt -lt $MAX_FIND_ATTEMPTS ]; then
              sleep 60
            fi
          done

          if [ -z "$FOUND_RUN_ID" ]; then
            echo "::error Could not find $SEARCH_ID workflow run after $MAX_FIND_ATTEMPTS attempts"
            exit 1
          fi

          # --- Phase 2: Poll until completion ---
          echo "Monitoring run $FOUND_RUN_ID"
          MAX_POLLS=$((24 * 60))

          for poll in $(seq 1 $MAX_POLLS); do
            RUN_INFO=$(curl -s -f -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$TARGET_REPO/actions/runs/$FOUND_RUN_ID")

            STATUS=$(echo "$RUN_INFO" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_INFO" | jq -r '.conclusion // "pending"')

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "PR $SEARCH_ID workflow succeeded"
                exit 0
              else
                echo "PR $SEARCH_ID workflow failed: $CONCLUSION"
                echo "Details: https://github.com/$TARGET_REPO/actions/runs/$FOUND_RUN_ID"
                exit 1
              fi
            fi

            sleep 60
          done

          echo "::error Polling timed out after $MAX_POLLS minutes"
          exit 1
    if: ${{ github.event_name == 'pull_request_target' && !contains(github.event.pull_request.labels.*.name, 'jdk-dependent') }}
